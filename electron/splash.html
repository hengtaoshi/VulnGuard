<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VulnGuard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;margin:0}
body{
  background:#0f172a;color:#e0e6f0;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;user-select:none;
}
.splash{text-align:center}
.shield-wrap{margin:0 auto 28px;display:flex;align-items:center;justify-content:center}
.trace{width:96px;height:96px;display:block}
.trace path{
  fill:none;stroke:#22c55e;stroke-width:1.5;
  stroke-dasharray:180;stroke-dashoffset:180;
  animation:trace 2.4s ease-in-out infinite;
}
@keyframes trace{
  0%{stroke-dashoffset:180;opacity:.3}
  50%{stroke-dashoffset:0;opacity:1}
  90%{opacity:1}
  100%{stroke-dashoffset:-180;opacity:.3}
}
h1{font-size:28px;font-weight:800;letter-spacing:-.3px}
h1 span{color:#22c55e}
.sub{font-size:13px;color:#4a5568;margin-top:6px;letter-spacing:1.5px}
</style>
</head>
<body>
<div class="splash">
  <div class="shield-wrap">
    <svg class="trace" viewBox="0 0 24 24"><path d="M12 2l7 4v5c0 5-3.5 9.7-7 11-3.5-1.3-7-6-7-11V6l7-4z"/></svg>
  </div>
  <h1>Vuln<span>Guard</span></h1>
  <p class="sub">SECURITY SCANNER</p>
</div>
</body>
</html>
